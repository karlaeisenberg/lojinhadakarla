<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Catálogo | Lojinha da Karla</title><link rel="stylesheet" href="styles.css"><style>main{max-width:1000px;margin:auto;padding:50px 20px}.admin-head{display:flex;justify-content:space-between;align-items:center}.admin-box{background:#17140f;border:1px solid var(--line);padding:25px;margin-top:25px}.admin-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:8px}.admin-grid input,.admin-grid select{background:#0c0a08;border:1px solid var(--line);color:white;padding:10px}.admin-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:10px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}.admin-row small{color:var(--muted)}@media(max-width:700px){.admin-grid{grid-template-columns:1fr}.admin-row{grid-template-columns:1fr auto}.admin-row span{grid-column:1}.admin-row small{grid-column:1}}</style></head><body><main><div class="admin-head"><div><p class="eyebrow">Estrutura administrativa</p><h1>Gerenciar catálogo</h1></div><a class="button outline" href="index.html">Ver loja</a></div><p>Esta área salva alterações neste aparelho. Está preparada para ser conectada futuramente a um banco de dados com acesso protegido.</p><div class="admin-box"><h2>Novo perfume</h2><form id="productForm" class="admin-grid"><input id="pName" required placeholder="Nome"><input id="pBrand" required placeholder="Marca"><input id="pVolume" required placeholder="Volume"><input id="pPrice" required type="number" step="0.01" placeholder="Preço"><button class="button gold">Adicionar</button></form></div><div class="admin-box"><h2>Produtos</h2><div id="adminList"></div><button class="button outline" id="reset">Restaurar catálogo original</button></div></main><script src="products.js"></script><script src="admin.js"></script></body></html>
